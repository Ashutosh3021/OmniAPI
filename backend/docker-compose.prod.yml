# Production stack — use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Set secrets via .env (never commit). PostgreSQL and Redis are not exposed to the host.

version: "3.9"

services:
  api:
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SECRET_KEY: ${SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ENVIRONMENT: production
      DEBUG: "False"
    expose:
      - "8000"
    profiles: []

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    restart: always

  celery_worker:
    restart: always

  celery_beat:
    restart: always

  redis:
    restart: always
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    expose:
      - "6379"
    ports: []

volumes:
  redis_data:
