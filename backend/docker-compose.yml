# Redis for caching and Celery (Supabase hosts PostgreSQL separately)
services:
  redis:
    image: redis:7-alpine
    container_name: omniapi-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  api:
    build: .
    container_name: omniapi-api
    ports:
      - "8000:8000"
    env_file:
      - .env.local
    environment:
      REDIS_URL: redis://redis:6379/0
      REDIS_HOST: redis
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - full

volumes:
  redis_data:
